<!DOCTYPE html>
<html lang="es">
<head>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<script src="../../_ds_bundle.js"></script>
<style>
  body { margin:0; background:var(--surface-page); color:var(--text-primary);
    font-family:var(--font-body); padding:28px; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:20px; max-width:620px; }
  a { color:var(--pink-300); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Input, Select, Checkbox, Button } = window.ImpactaIADesignSystem_4dab94;
function Demo(){
  return (
    <div style={{maxWidth:620}}>
      <div className="grid2">
        <Input label="Nombre" required placeholder="Nombre y apellido" />
        <Input label="Email corporativo" type="email" required placeholder="tu@empresa.cl" />
        <Select label="Nivel de responsabilidad" required
          options={["Gerente General / CEO","Director(a)","Gerente","Jefatura / Líder"]} />
        <Select label="Área" required
          options={["Innovación","Tecnología (TI)","Recursos Humanos","Finanzas"]} />
      </div>
      <div style={{margin:'20px 0'}}>
        <Checkbox defaultChecked>
          Acepto que Brinca trate mis datos conforme a la <a href="#">política de privacidad</a> (Ley 21.719).
        </Checkbox>
      </div>
      <Button variant="primary" arrow>Quiero participar</Button>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
