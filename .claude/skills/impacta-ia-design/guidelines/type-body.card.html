<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-page);font-family:var(--font-body);padding:26px;color:var(--white);}
  p{margin:0 0 12px;max-width:60ch;}
  .lead{font-size:18px;line-height:1.5;color:var(--white);}
  .base{font-size:15px;line-height:1.6;color:var(--text-secondary);}
  .weights{display:flex;gap:18px;margin-top:6px;font-size:16px;}
  .weights span{color:var(--text-secondary);}
</style></head><body>
<p class="lead">Un evento para líderes que están definiendo el futuro de sus organizaciones con IA.</p>
<p class="base">Dos días de inmersión en IA aplicada, casos reales y networking estratégico. Cupos limitados y cuidadosamente seleccionados.</p>
<div class="weights">
  <span style="font-weight:300">Light</span>
  <span style="font-weight:400">Regular</span>
  <span style="font-weight:500">Medium</span>
  <span style="font-weight:600">Semibold</span>
  <span style="font-weight:700">Bold</span>
  <span style="font-weight:900">Black</span>
</div>
</body></html>
