<!-- @dsCard group="Colors" viewport="700x180" name="Brand accents" subtitle="Magenta · Teal · Electric Blue — the node network" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-page);font-family:var(--font-body);padding:24px;}
  .row{display:flex;gap:14px;}
  .sw{flex:1;height:118px;border-radius:var(--radius-md);border:1px solid var(--w-10);
    display:flex;flex-direction:column;justify-content:flex-end;padding:12px;color:#fff;}
  .name{font-family:var(--font-lecturis-rounded);font-weight:700;font-size:13px;}
  .hex{font-size:11px;opacity:.8;letter-spacing:.02em;font-variant-numeric:tabular-nums;}
</style></head><body>
<div class="row">
  <div class="sw" style="background:var(--pink-500)"><span class="name">Magenta / Primary</span><span class="hex">#ED1E79</span></div>
  <div class="sw" style="background:var(--teal-500);color:#04160c"><span class="name">Teal</span><span class="hex">#1DD2B3</span></div>
  <div class="sw" style="background:var(--blue-400)"><span class="name">Electric Blue</span><span class="hex">#6666FF</span></div>
</div>
</body></html>
