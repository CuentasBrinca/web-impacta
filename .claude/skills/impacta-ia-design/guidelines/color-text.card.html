<!-- @dsCard group="Colors" viewport="700x150" name="Text on dark" subtitle="White-alpha ladder for text & borders" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-page);font-family:var(--font-body);padding:24px;}
  .row{display:flex;gap:22px;align-items:baseline;flex-wrap:wrap;}
  .item{display:flex;flex-direction:column;gap:3px;}
  .t{font-size:22px;font-weight:500;}
  .k{font-size:10px;color:var(--text-muted);letter-spacing:.03em;}
</style></head><body>
<div class="row">
  <div class="item"><span class="t" style="color:var(--white)">Aa</span><span class="k">primary · #fff</span></div>
  <div class="item"><span class="t" style="color:var(--w-70)">Aa</span><span class="k">secondary · 70%</span></div>
  <div class="item"><span class="t" style="color:var(--w-50)">Aa</span><span class="k">tertiary · 50%</span></div>
  <div class="item"><span class="t" style="color:var(--w-35)">Aa</span><span class="k">muted · 35%</span></div>
  <div class="item" style="border:1px solid var(--w-10);border-radius:8px;padding:8px 12px"><span class="k">border 10%</span></div>
  <div class="item" style="border:1px solid var(--w-25);border-radius:8px;padding:8px 12px"><span class="k">border 25%</span></div>
</div>
</body></html>
