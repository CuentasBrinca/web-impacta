<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-page);font-family:var(--font-body);padding:24px;color:var(--white);}
  .row{display:flex;gap:16px;}
  .card{flex:1;background:var(--surface-card);border:1px solid var(--w-10);border-radius:var(--radius-lg);
    padding:18px;display:flex;flex-direction:column;gap:10px;position:relative;overflow:hidden;}
  .card img{height:56px;width:56px;object-fit:contain;}
  .n{font-family:var(--font-display);font-size:20px;}
  .e{font-family:var(--font-lecturis-rounded);font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.14em;}
</style></head><body>
<div class="row">
  <div class="card"><img src="../assets/icon-innovar.png" alt=""><span class="e" style="color:var(--pink-500)">Eje 01</span><span class="n">Innovar</span></div>
  <div class="card"><img src="../assets/icon-adoptar.png" alt=""><span class="e" style="color:var(--blue-400)">Eje 02</span><span class="n">Adoptar</span></div>
  <div class="card"><img src="../assets/icon-escalar.png" alt=""><span class="e" style="color:var(--teal-500)">Eje 03</span><span class="n">Escalar</span></div>
</div>
</body></html>
