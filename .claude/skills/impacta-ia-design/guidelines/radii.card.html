<!-- @dsCard group="Spacing" viewport="700x180" name="Radii & cards" subtitle="Corner radii + card treatment" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-page);font-family:var(--font-body);padding:24px;color:var(--white);}
  .row{display:flex;gap:16px;align-items:center;}
  .box{width:74px;height:74px;background:var(--surface-card);border:1px solid var(--w-15);
    display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;font-size:10px;color:var(--text-muted);}
  .pill{padding:10px 18px;border-radius:var(--radius-pill);background:var(--pink-500);font-family:var(--font-lecturis-rounded);font-weight:700;font-size:13px;}
</style></head><body>
<div class="row">
  <div class="box" style="border-radius:var(--radius-xs)">xs 6</div>
  <div class="box" style="border-radius:var(--radius-sm)">sm 10</div>
  <div class="box" style="border-radius:var(--radius-md)">md 16</div>
  <div class="box" style="border-radius:var(--radius-lg)">lg 24</div>
  <div class="box" style="border-radius:var(--radius-xl)">xl 32</div>
  <div class="pill">pill · CTA</div>
</div>
</body></html>
