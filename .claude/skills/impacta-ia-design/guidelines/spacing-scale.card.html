<!-- @dsCard group="Spacing" viewport="700x210" name="Spacing scale" subtitle="4px base rhythm" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-page);font-family:var(--font-body);padding:24px;color:var(--white);}
  .r{display:flex;align-items:center;gap:14px;padding:3px 0;}
  .k{width:96px;font-size:11px;color:var(--text-muted);font-variant-numeric:tabular-nums;}
  .bar{height:14px;background:var(--pink-500);border-radius:3px;}
</style></head><body>
  <div class="r"><span class="k">2 · 8px</span><div class="bar" style="width:8px"></div></div>
  <div class="r"><span class="k">4 · 16px</span><div class="bar" style="width:16px"></div></div>
  <div class="r"><span class="k">5 · 24px</span><div class="bar" style="width:24px"></div></div>
  <div class="r"><span class="k">6 · 32px</span><div class="bar" style="width:32px"></div></div>
  <div class="r"><span class="k">7 · 48px</span><div class="bar" style="width:48px"></div></div>
  <div class="r"><span class="k">8 · 64px</span><div class="bar" style="width:64px"></div></div>
  <div class="r"><span class="k">9 · 96px</span><div class="bar" style="width:96px"></div></div>
  <div class="r"><span class="k">10 · 128px</span><div class="bar" style="width:128px"></div></div>
</body></html>
