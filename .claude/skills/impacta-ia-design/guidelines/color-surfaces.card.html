<!-- @dsCard group="Colors" viewport="700x180" name="Dark surfaces" subtitle="Near-black surface ladder" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:#000;font-family:var(--font-body);padding:24px;}
  .row{display:flex;gap:10px;}
  .sw{flex:1;height:118px;border-radius:var(--radius-md);border:1px solid var(--w-10);
    display:flex;flex-direction:column;justify-content:flex-end;padding:12px;color:var(--text-secondary);}
  .name{font-family:var(--font-lecturis-rounded);font-weight:700;font-size:12px;color:var(--white);}
  .hex{font-size:11px;letter-spacing:.02em;font-variant-numeric:tabular-nums;}
</style></head><body>
<div class="row">
  <div class="sw" style="background:var(--ink-900)"><span class="name">Page</span><span class="hex">#0E0E10</span></div>
  <div class="sw" style="background:var(--ink-850)"><span class="name">850</span><span class="hex">#111113</span></div>
  <div class="sw" style="background:var(--ink-800)"><span class="name">Raised</span><span class="hex">#161618</span></div>
  <div class="sw" style="background:var(--ink-750)"><span class="name">Card</span><span class="hex">#18181A</span></div>
  <div class="sw" style="background:var(--ink-500)"><span class="name">Muted</span><span class="hex">#747476</span></div>
</div>
</body></html>
