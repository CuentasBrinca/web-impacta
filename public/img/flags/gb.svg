<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="gb-circle"><circle cx="12" cy="12" r="12"/></clipPath>
  </defs>
  <g clip-path="url(#gb-circle)">
    <rect x="0" y="0" width="24" height="24" fill="#012169"/>
    <!-- White diagonals (St Andrew + St Patrick base) -->
    <path d="M0 0 L24 24 M24 0 L0 24" stroke="#FFFFFF" stroke-width="4.8"/>
    <!-- Red diagonals (St Patrick), offset to form the saltire -->
    <path d="M0 0 L24 24" stroke="#C8102E" stroke-width="1.6"/>
    <path d="M24 0 L0 24" stroke="#C8102E" stroke-width="1.6"/>
    <!-- White cross (St George base) -->
    <path d="M12 0 V24 M0 12 H24" stroke="#FFFFFF" stroke-width="8"/>
    <!-- Red cross (St George) -->
    <path d="M12 0 V24 M0 12 H24" stroke="#C8102E" stroke-width="4.8"/>
  </g>
</svg>
